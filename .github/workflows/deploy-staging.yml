name: Deploy Staging

on:
  push:
    branches: [dev]

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Staging Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ella/db exec prisma generate

      - name: Check migration status
        run: pnpm --filter @ella/db exec prisma migrate status || true
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_STAGING }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_STAGING }}

      - name: Run migrations
        run: pnpm --filter @ella/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_STAGING }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_STAGING }}

  verify:
    name: Verify Staging Deployment
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Wait for Railway auto-deploy to complete
        run: sleep 120

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            response=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://api-staging.ella.tax/health")
            if [ "$response" = "200" ]; then
              echo "Staging health check passed!"
              exit 0
            fi
            echo "Attempt $i: got status $response, retrying in 30s..."
            sleep 30
          done
          echo "::error::Staging health check FAILED after 6 attempts (last status: $response)"
          exit 1
