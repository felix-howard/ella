name: CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-immutability:
    name: Migration Immutability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block edits to existing Prisma migrations
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch origin "$BASE_SHA" --depth=1

          CHANGED_EXISTING_MIGRATIONS=$(git diff --name-status --diff-filter=MDRC "$BASE_SHA"...HEAD -- 'packages/db/prisma/migrations/*/migration.sql' || true)

          if [ -n "$CHANGED_EXISTING_MIGRATIONS" ]; then
            echo "::error::Existing Prisma migration files must not be modified, deleted, renamed, or copied after they may have been applied."
            echo "$CHANGED_EXISTING_MIGRATIONS"
            echo "Create a new migration instead. Local-dev checksum drift can be fixed with migrate reset only against disposable databases."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ella/db exec prisma generate

      - name: Run type-check
        run: pnpm type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ella/db exec prisma generate

      # Build with staging env for PRs to dev, production env for PRs to main
      - name: Build all apps (staging)
        if: github.base_ref == 'dev'
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}
          VITE_API_URL: https://api-staging.ella.tax
          PUBLIC_API_URL: https://api-staging.ella.tax

      - name: Build all apps (production)
        if: github.base_ref == 'main'
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
          VITE_API_URL: https://api.ella.tax
          PUBLIC_API_URL: https://api.ella.tax
