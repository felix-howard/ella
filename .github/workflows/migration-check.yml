name: Migration Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/db/prisma/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  migration-check:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ella/db exec prisma generate

      - name: Check migration status against production
        id: migrate_status
        run: |
          OUTPUT=$(pnpm --filter @ella/db exec prisma migrate status 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Following migrations have not yet been applied"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            PENDING=$(echo "$OUTPUT" | grep -A 100 "Following migrations have not yet been applied" | grep "^  " | sed 's/^  /- /')
            {
              echo "pending_list<<EOF"
              echo "$PENDING"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
          fi
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}

      - name: Comment migration status on PR
        uses: actions/github-script@v7
        with:
          script: |
            const hasPending = '${{ steps.migrate_status.outputs.has_pending }}' === 'true';
            const pendingList = `${{ steps.migrate_status.outputs.pending_list }}`;

            let body;
            if (hasPending) {
              body = `## ⚠️ Migration Check — Pending Migrations\n\nThe following migrations need to be applied to **production** after merging:\n\n${pendingList}\n\n> Run \`prisma migrate deploy\` after merging to apply these migrations.`;
            } else {
              body = `## ✅ Migration Check — All Up to Date\n\nNo pending migrations. Production database is in sync.`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
