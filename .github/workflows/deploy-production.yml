name: Deploy Production

on:
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  backup:
    name: Backup Production Database
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create database backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}" \
            --no-owner \
            --no-acl \
            --format=custom \
            --file="backup_${TIMESTAMP}.dump"
          echo "Backup created: backup_${TIMESTAMP}.dump"
          ls -lh backup_*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.sha }}
          path: backup_*.dump
          retention-days: 30

  migrate:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    needs: backup
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ella/db exec prisma generate

      - name: Check migration status
        run: pnpm --filter @ella/db exec prisma migrate status || true
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}

      - name: Run migrations
        run: pnpm --filter @ella/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_PRODUCTION }}

  verify:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Wait for Railway auto-deploy to complete
        run: sleep 120

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            response=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "https://api.ella.tax/health")
            if [ "$response" = "200" ]; then
              echo "Production health check passed!"
              exit 0
            fi
            echo "Attempt $i: got status $response, retrying in 30s..."
            sleep 30
          done
          echo "::error::Production health check FAILED after 6 attempts (last status: $response)"
          exit 1
